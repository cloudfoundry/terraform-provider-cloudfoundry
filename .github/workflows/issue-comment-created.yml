name: Issue Comment Created Triage

on:
  issue_comment:
    types: [created]

# Security: issue_comment triggers fire for any authenticated GitHub user on public repos.
# Restrict token to only the permissions this workflow needs.
# See: https://www.upwind.io/feed/hackerbot-claw-github-actions-pull-request-rce
permissions:
  issues: write
  pull-requests: write

jobs:
  issue_comment_triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions-ecosystem/action-remove-labels@2ce5d41b4b6aa8503e285553f75ed56e0a40bae0 # v1.3.0
        with:
          labels: |
            needs-author-feedback